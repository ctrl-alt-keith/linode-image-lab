# Bounded capture-replicate-deploy execute smoke config for India.
# Deploy intent uses one explicit region to keep provider smoke narrow.
# Image availability uses the checked-in geo_india_image_replication group.
# ap-west is used for deploy/capture while image availability targets in-maa.
# This is not broad geo deploy fan-out coverage.
# Review dry-run output before executing with --execute and LINODE_TOKEN.
schema_version = 1

[defaults]
ttl = "3h"

[capture-replicate-deploy]
deploy_regions = ["ap-west"]
replication_groups = ["geo_india_image_replication"]
source_image = "linode/alpine3.23"
type = "g6-nanode-1"
