# Bounded capture-replicate-deploy execute smoke config for Americas.
# Deploy intent uses one explicit region to keep provider smoke narrow.
# Image availability uses the checked-in geo_americas_image_replication group.
# This is not broad geo deploy fan-out coverage.
# Review dry-run output before executing with --execute and LINODE_TOKEN.
schema_version = 1

[defaults]
ttl = "3h"

[capture-replicate-deploy]
deploy_regions = ["us-sea"]
replication_groups = ["geo_americas_image_replication"]
source_image = "linode/alpine3.23"
type = "g6-nanode-1"
