# Capture-replicate-deploy execute smoke config for Oceania.
# Deploy intent uses the operator-owned geo_oceania group.
# No matching checked-in geo_oceania_image_replication group exists.
# With replication_groups omitted, current backward-compatible behavior uses resolved deploy targets as replication targets.
# Execute may fail closed if any deploy target is not image-replication eligible.
# Review dry-run output before executing with --execute and LINODE_TOKEN.
schema_version = 1

[defaults]
ttl = "3h"

[capture-replicate-deploy]
deploy_groups = ["geo_oceania"]
# replication_groups intentionally omitted: no geo_oceania_image_replication group exists in the checked-in policy artifact.
source_image = "linode/alpine3.23"
type = "g6-nanode-1"
