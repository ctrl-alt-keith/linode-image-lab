# Capture-replicate-deploy execute smoke config for Europe.
# Deploy intent uses the operator-owned geo_europe group.
# Image availability uses the checked-in geo_europe_image_replication group.
# gb-lon remains a deploy target but is excluded from image replication by policy.
# Review dry-run output before executing with --execute and LINODE_TOKEN.
schema_version = 1

[defaults]
ttl = "3h"

[capture-replicate-deploy]
deploy_groups = ["geo_europe"]
replication_groups = ["geo_europe_image_replication"]
source_image = "linode/alpine3.23"
type = "g6-nanode-1"
