# Capture-replicate-deploy execute smoke config for APAC North.
# Deploy intent uses the operator-owned geo_apac_north group.
# No matching checked-in geo_apac_north_image_replication group exists.
# jp-tyo-3 is a known image-replication provider discrepancy in the checked-in policy:
# it advertises Object Storage, but image replication POST rejects it.
# With replication_groups omitted, current backward-compatible behavior uses resolved deploy targets as replication targets.
# Execute may fail closed if any deploy target is not image-replication eligible.
# Review dry-run output before executing with --execute and LINODE_TOKEN.
schema_version = 1

[defaults]
ttl = "3h"

[capture-replicate-deploy]
deploy_groups = ["geo_apac_north"]
# replication_groups intentionally omitted: no geo_apac_north_image_replication group exists in the checked-in policy artifact.
source_image = "linode/alpine3.23"
type = "g6-nanode-1"
