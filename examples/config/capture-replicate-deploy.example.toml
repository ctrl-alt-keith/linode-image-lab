schema_version = 1

[defaults]
ttl = "12h"

[capture-replicate-deploy]
# Deploy groups expand deploy targets. Replication groups expand image
# availability only; neither surface automatically expands the other.
deploy_groups = ["geo_americas"]
replication_groups = ["geo_americas_image_replication"]
# region_policy_file = "policy/staging-region-policy.toml"
source_image = "linode/alpine3.23"
type = "g6-nanode-1"
firewall_id = 12345
