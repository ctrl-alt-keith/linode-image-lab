# Broad capture-replicate-deploy validation config for Oceania.
# Deploy intent uses the operator-owned geo_oceania group.
# Replication is intentionally disabled because no checked-in known-good
# geo_oceania_image_replication group exists.
# This is deploy-only geo validation; no replication targets are implied.
# Review dry-run output before executing with --execute and LINODE_TOKEN.
schema_version = 1

[defaults]
ttl = "3h"

[capture-replicate-deploy]
deploy_groups = ["geo_oceania"]
replication_enabled = false
source_image = "linode/alpine3.23"
type = "g6-nanode-1"
